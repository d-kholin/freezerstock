<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Glow gradient from inside the door -->
    <radialGradient id="glowGrad" cx="62%" cy="45%" r="55%" fx="62%" fy="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#bfdbfe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- Freezer body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Door inner face gradient -->
    <linearGradient id="doorInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Inner glow fill -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#dbeafe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e40af" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Freezer body (main cabinet) -->
  <rect x="96" y="60" width="260" height="400" rx="28" ry="28" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Freezer top compartment divider line -->
  <rect x="96" y="185" width="260" height="6" rx="3" fill="#1d4ed8"/>

  <!-- Hinge (right side, top) -->
  <rect x="338" y="90" width="18" height="28" rx="6" fill="#1e40af"/>
  <!-- Hinge (right side, bottom) -->
  <rect x="338" y="340" width="18" height="28" rx="6" fill="#1e40af"/>

  <!-- Door (partially open, rotated around right hinge) -->
  <!-- Door is angled open — we simulate by drawing it slightly offset and narrower -->
  <g transform="translate(356,256) rotate(-18) translate(-356,-256)">
    <!-- Door outer face -->
    <rect x="100" y="62" width="254" height="392" rx="24" ry="24" fill="url(#doorInner)"/>
    <!-- Door inner face (visible glow area) -->
    <rect x="112" y="74" width="228" height="366" rx="18" ry="18" fill="url(#innerGlow)"/>
    <!-- Freezer interior shelves (visible through opening) -->
    <rect x="124" y="160" width="204" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
    <rect x="124" y="250" width="204" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
    <rect x="124" y="340" width="204" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
    <!-- Door handle -->
    <rect x="124" y="220" width="10" height="90" rx="5" fill="#eff6ff" opacity="0.9"/>
  </g>

  <!-- Glow spilling out from inside -->
  <ellipse cx="310" cy="256" rx="130" ry="200" fill="url(#glowGrad)" opacity="0.55"/>

  <!-- Cabinet rim highlight -->
  <rect x="96" y="60" width="260" height="400" rx="28" ry="28"
        fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>

  <!-- Small ice crystal accent (top left of cabinet) -->
  <g transform="translate(148,110)" opacity="0.7">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#bfdbfe" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#bfdbfe" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
